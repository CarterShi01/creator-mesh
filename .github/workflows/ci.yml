name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  verify:
    name: Typecheck and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify
